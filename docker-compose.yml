services:
  db:
    image: postgres:17-alpine
    container_name: project-uno-db
    restart: always
    environment:
      POSTGRES_USER: megas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yourpassword}
      POSTGRES_DB: monozao_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U megas -d monozao_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project-uno-app
    restart: always
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://megas:${DB_PASSWORD:-yourpassword}@db:5432/monozao_db
      DIRECT_URL: postgresql://megas:${DB_PASSWORD:-yourpassword}@db:5432/monozao_db
      JWT_SECRET: ${JWT_SECRET:-yourSecret}
      X_SIGN: ${X_SIGN:-ultraSecretPassword}
      VITE_X_SIGN: ${VITE_X_SIGN:-ultraSecretPassword}
      VITE_BASE_URL: ${VITE_BASE_URL}
      VITE_SOCKET_URL: ${VITE_SOCKET_URL}
    depends_on:
      - db
    volumes:
      - ./prisma:/app/prisma
      - app_uploads:/app/uploads
    networks:
      - app-network
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`app.megas.uno`)"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.routers.app.tls.certresolver=lets-encrypt"
      - "traefik.http.services.app.loadbalancer.server.port=3001"
      - "traefik.docker.network=web"
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    command: sh -c "until nc -z db 5432; do echo '⏳ Waiting for Postgres...'; sleep 2; done && echo '✅ Database ready!' && npx prisma migrate deploy && node dist/index.js"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3001"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  app_uploads:
    driver: local

networks:
  app-network:
    driver: bridge
  web:
    external: true
